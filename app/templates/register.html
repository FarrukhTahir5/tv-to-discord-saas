{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-8">
        <h1 class="text-2xl font-bold mb-2">Create your account</h1>
        <p class="text-gray-400 text-sm mb-8">Start sending chart alerts to Discord in 2 minutes</p>

        <form method="POST" action="/auth/register" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5">Email</label>
                <input type="email" name="email" required
                    class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition"
                    placeholder="you@example.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
                <input type="password" name="password" required minlength="8"
                    class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition"
                    placeholder="Min 8 characters">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 py-2.5 rounded-xl font-semibold transition-all hover:shadow-lg hover:shadow-blue-500/25">
                Create Account
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Already have an account? <a href="/login" class="text-blue-400 hover:underline">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
