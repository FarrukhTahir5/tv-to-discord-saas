{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto text-center py-20">
    <div class="mb-6 inline-flex items-center justify-center w-20 h-20 bg-blue-500/10 rounded-full border border-blue-500/30">
        <span class="text-4xl text-blue-400">📧</span>
    </div>

    <h1 class="text-3xl font-extrabold mb-4 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
        {{ title }}
    </h1>

    <p class="text-lg text-gray-300 mb-8 leading-relaxed">
        {{ message }}
    </p>

    <div class="space-y-4">
        <a href="/dashboard" 
           class="block w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition flex items-center justify-center gap-2">
            Go to Dashboard <span>→</span>
        </a>
        
        <p class="text-xs text-gray-500">
            Wait for a few minutes after paying. Your account will update automatically once the payment is confirmed on the blockchain.
        </p>
    </div>
</div>
{% endblock %}
