<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <title>{% block title %}{{ title | default('') }}{% endblock %} | {{ app_name | default('ChartAlert') }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', sans-serif;
    }

    code,
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>

<body class="bg-gray-950 text-gray-100 min-h-screen">

  <nav class="border-b border-gray-800 px-6 py-4 flex items-center justify-between">
    <a href="/" class="text-lg font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
      ⚡ {{ app_name | default('ChartAlert') }}
    </a>
    <div class="flex items-center gap-4">
      {% if user %}
      <span class="text-sm text-gray-400">{{ user.email }}</span>
      <span class="text-xs px-2 py-0.5 rounded-full font-semibold
          {% if user.effective_plan == 'pro' %}bg-blue-500/20 text-blue-400 border border-blue-500/30
          {% else %}bg-gray-700/50 text-gray-400 border border-gray-600{% endif %}">
        {{ user.effective_plan | upper }}
      </span>
      <a href="/dashboard" class="text-sm text-gray-400 hover:text-white transition">Dashboard</a>
      <a href="/auth/logout" class="text-sm text-gray-500 hover:text-white transition">Logout</a>
      {% else %}
      <a href="/pricing" class="text-sm text-gray-400 hover:text-white transition">Pricing</a>
      <a href="/login" class="text-sm text-gray-400 hover:text-white transition">Login</a>
      <a href="/register"
        class="text-sm px-4 py-1.5 bg-blue-600 hover:bg-blue-500 rounded-lg font-medium transition">Sign Up</a>
      {% endif %}
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-gray-800 py-8 mt-20">
    <div class="max-w-5xl mx-auto px-6 flex flex-col items-center gap-3">
      <div class="flex items-center gap-4 text-sm text-gray-500">
        <a href="/pricing" class="hover:text-gray-300 transition">Pricing</a>
        <span class="text-gray-700">·</span>
        <a href="/terms" class="hover:text-gray-300 transition">Terms & Conditions</a>
      </div>
      <div class="text-sm text-gray-600">
        &copy; 2025 {{ app_name | default('ChartAlert') }}. All rights reserved.
      </div>
    </div>
  </footer>

</body>

</html>
