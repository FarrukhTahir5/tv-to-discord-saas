# Production Docker Compose — deploy API + Worker as separate services
# Usage: docker compose -f docker-compose.prod.yml up -d

version: "3.9"

services:
  # -----------------------------------------------------------------
  # API service (HTTP, webhooks, dashboard — no browser)
  # -----------------------------------------------------------------
  api:
    build: .
    environment:
      RUN_MODE: api
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      APP_NAME: ${APP_NAME:-Chart Alert}
      APP_URL: ${APP_URL:-https://chartalert.online}
      LEMONSQUEEZY_API_KEY: ${LEMONSQUEEZY_API_KEY}
      LEMONSQUEEZY_WEBHOOK_SECRET: ${LEMONSQUEEZY_WEBHOOK_SECRET}
      LEMONSQUEEZY_STORE_ID: ${LEMONSQUEEZY_STORE_ID}
      LEMONSQUEEZY_VARIANT_ID_MONTHLY: ${LEMONSQUEEZY_VARIANT_ID_MONTHLY}
      LEMONSQUEEZY_VARIANT_ID_YEARLY: ${LEMONSQUEEZY_VARIANT_ID_YEARLY}
      REDIS_URL: ${REDIS_URL:-}
    command: >
      bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -----------------------------------------------------------------
  # Worker service (Playwright browser + queue consumer)
  # -----------------------------------------------------------------
  worker:
    build: .
    environment:
      RUN_MODE: worker
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      APP_NAME: ${APP_NAME:-Chart Alert}
      APP_URL: ${APP_URL:-https://chartalert.online}
      REDIS_URL: ${REDIS_URL:-}
      SCREENSHOT_CONCURRENCY: ${SCREENSHOT_CONCURRENCY:-2}
    command: >
      bash -c "uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 1"
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/playwright"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -----------------------------------------------------------------
  # Caddy reverse proxy (Auto HTTPS)
  # -----------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
