

services:
  # -----------------------------------------------------------------
  # PostgreSQL database
  # -----------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chartapp
      POSTGRES_PASSWORD: localpass
      POSTGRES_DB: chartapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chartapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # API service (no browser, no worker)
  # -----------------------------------------------------------------
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      RUN_MODE: api
      DATABASE_URL: postgresql+asyncpg://chartapp:localpass@db:5432/chartapp
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # -----------------------------------------------------------------
  # Worker service (browser + queue consumer)
  # -----------------------------------------------------------------
  worker:
    build: .
    env_file: .env
    environment:
      RUN_MODE: worker
      DATABASE_URL: postgresql+asyncpg://chartapp:localpass@db:5432/chartapp
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      bash -c "uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 1"

volumes:
  postgres_data:
